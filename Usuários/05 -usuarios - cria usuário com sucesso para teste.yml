info:
  name: 05 /usuarios - cria usuário com sucesso para teste
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/usuarios"
  body:
    type: json
    data: |-
      {
        "nome": "Fulano da Silva",
        "email": "{{$randomEmail}}",
        "password": "teste",
        "administrador": "true"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 201 - Criado", function() {
          expect(res.getStatus()).to.equal(201);
        });

        test("Deve confirmar mensagem de sucesso", function() {
          const data = res.getBody();
          expect(data.message).to.equal("Cadastro realizado com sucesso");
          expect(data._id).to.be.a('string');
        });

        bru.setVar("idSegundoUsuario",res.getBody()._id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
