info:
  name: 03 /usuarios/{{_id}} - verificar usuário com sucesso
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/usuarios/{{idUsuarioDuplicado}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("A resposta deve ser um JSON válido", function() {
          expect(res.getHeader('content-type')).to.include('application/json');
        });

        test("Deve retornar a lista do usuário atualizado", function() {
          const usuario = res.getBody();
            expect(usuario).to.have.all.keys('nome', 'email', 'password', 'administrador', '_id');
            expect(usuario.email).to.include('@');
          // Validação simples de formato
            expect(usuario.administrador).to.be.oneOf(['true', 'false']);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
