info:
  name: 09 /usuarios/{{_id}} - excluir usuário com sucesso
  type: http
  seq: 9

http:
  method: DELETE
  url: "{{url}}/usuarios/{{idSegundoUsuario}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 200 - Excluido", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Deve confirmar mensagem de erro", function() {
          const data = res.getBody();
          expect(data.message).to.equal("Registro excluído com sucesso");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
