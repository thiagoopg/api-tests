info:
  name: 01 /usuarios - retorna usuários com sucess
  type: http
  seq: 1

http:
  method: GET
  url: "{{url}}/usuarios"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("A resposta deve ser um JSON válido", function() {
          expect(res.getHeader('content-type')).to.include('application/json');
        });

        test("Deve retornar a lista de usuários com os campos obrigatórios", function() {
          const data = res.getBody();
          
          // Valida se a quantidade é um número e se o array existe
          expect(data.quantidade).to.be.a('number');
          expect(data.usuarios).to.be.an('array');

          // Se houver pelo menos um usuário, valida o contrato (Schema)
          if (data.usuarios.length > 0) {
            const usuario = data.usuarios[0];
            expect(usuario).to.have.all.keys('nome', 'email', 'password', 'administrador', '_id');
            expect(usuario.email).to.include('@'); // Validação simples de formato
            expect(usuario.administrador).to.be.oneOf(['true', 'false']);
          }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
