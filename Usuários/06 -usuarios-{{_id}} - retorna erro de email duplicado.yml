info:
  name: 06 /usuarios/{{_id}} - retorna erro de email duplicado
  type: http
  seq: 6

http:
  method: PUT
  url: "{{url}}/usuarios/{{idSegundoUsuario}}"
  body:
    type: json
    data: |-
      {
        "nome": "Email duplicado",
        "email": "{{emailDuplicado}}",
        "password": "teste",
        "administrador": "true"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 200", function() {
          expect(res.getStatus()).to.equal(400);
        });

        test("Deve confirmar mensagem de erro", function() {
          const data = res.getBody();
          expect(data.message).to.equal("Este email já está sendo usado");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
