info:
  name: 04 /produtos - retorna erro ao criar produto com nome duplicado
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/produtos"
  headers:
    - name: Authorization
      value: "{{token}}"
  body:
    type: json
    data: |-
      {
        "nome": "{{nomeProdutoDuplicado}}",
        "preco": 4700,
        "descricao": "mouse gamer duplicado",
        "quantidade": 201
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 400 - Bad Request", function() {
          expect(res.getStatus()).to.equal(400);
        });

        test("Deve confirmar mensagem de erro", function() {
          const data = res.getBody();
          expect(data.message).to.equal("Já existe produto com esse nome");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
