info:
  name: Login com email falho
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/login"
  body:
    type: json
    data: |-
      {
        "email": "admin@master.com.br",
        "password": "Admin123"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 200 - Logado", function() {
          expect(res.getStatus()).to.equal(401);
        });

        test("Deve confirmar mensagem de erro", function() {
          const data = res.getBody();
          expect(data.message).to.equal("Email e/ou senha inválidos");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
