info:
  name: 08 /produtos/{{_id}} - excluir produto com sucesso
  type: http
  seq: 8

http:
  method: DELETE
  url: "{{url}}/produtos/{{idProdutoDuplicado}}"
  headers:
    - name: Authorization
      value: "{{token}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 200 - Excluido", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Deve confirmar mensagem de erro", function() {
          const data = res.getBody();
          expect(data.message).to.equal("Registro excluído com sucesso");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
