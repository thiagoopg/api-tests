info:
  name: 03 /produtos/{_id}
  type: http
  seq: 3

http:
  method: GET
  url: "{{url}}/produtos/{{idProdutoDuplicado}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("A resposta deve ser um JSON válido", function() {
          expect(res.getHeader('content-type')).to.include('application/json');
        });

        test("Deve retornar a lista do produto criado", function() {
          const usuario = res.getBody();
            expect(usuario).to.have.all.keys('nome', 'preco', 'descricao', 'quantidade', '_id');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
