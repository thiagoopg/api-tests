info:
  name: 06 Listar Carrinho Criado
  type: http
  seq: 6

http:
  method: GET
  url: "{{url}}/carrinhos/{{carrinhoCriado}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("A resposta deve ser um JSON válido", function() {
          expect(res.getHeader('content-type')).to.include('application/json');
        });

        test("Deve retornar a lista de carrinhos com os campos obrigatórios", function() {
          const data = res.getBody();
          
          expect(data.produtos).to.be.an('array');

          // Se houver pelo menos um usuário, valida o contrato (Schema)
            const total = data.carrinhos[0];
          if (data.carrinhos.length > 0) {
            expect(total).to.include.keys('produtos')
            const produto = data.carrinhos[0].produtos[0];
            expect(produto).to.have.all.keys('idProduto', 'quantidade', 'precoUnitario');
          }
          expect(total).to.include.keys("precoTotal", "quantidadeTotal", "idUsuario", "_id")
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
