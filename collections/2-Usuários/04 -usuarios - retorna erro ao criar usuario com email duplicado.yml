info:
  name: 04 /usuarios - retorna erro ao criar usuario com email duplicado
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/usuarios"
  body:
    type: json
    data: |-
      {
        "nome": "Fulano da Silva",
        "email": "{{emailDuplicado}}",
        "password": "teste",
        "administrador": "true"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Deve retornar status 400 - Bad Request", function() {
          expect(res.getStatus()).to.equal(400);
        });

        test("Deve confirmar mensagem de erro", function() {
          const data = res.getBody();
          expect(data.message).to.equal("Este email já está sendo usado");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
