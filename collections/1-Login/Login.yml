info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/login"
  body:
    type: json
    data: |-
      {
        "email": "admin@master.com.br",
        "password": "Admin123!@#"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("token", res.getBody().authorization)
    - type: tests
      code: |-
        test("Deve retornar status 200 - Logado", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Deve confirmar mensagem de sucesso", function() {
          const data = res.getBody();
          expect(data.message).to.equal("Login realizado com sucesso");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
